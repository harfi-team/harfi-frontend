<h2 class="auth-form-title">{{ 'VERIFY_EMAIL' | translate }}</h2>
<p class="auth-form-desc">{{ 'VERIFY_EMAIL_DESC' | translate: {email: email} }}</p>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="otp-field">
    <label for="code" class="sr-only">{{ 'VERIFICATION_CODE' | translate }}</label>
    <input
      id="code"
      type="text"
      inputmode="numeric"
      formControlName="code"
      class="otp-input"
      placeholder="000000"
      maxlength="6"
      (input)="onCodeInput($event)"
    />
    @if (form.controls.code.touched && form.controls.code.invalid) {
      <span class="error-text">{{ 'VALIDATION_CODE' | translate }}</span>
    }
  </div>

  <button type="submit" class="btn-gradient w-100" [disabled]="form.invalid || loading">
    @if (loading) {
      <app-spinner [visible]="true" [fullPage]="false" />
    } @else {
      {{ 'CONFIRM' | translate }}
    }
  </button>
</form>

<div class="resend-section text-center">
  @if (countdown > 0) {
    <span class="resend-countdown">{{ 'RESEND_IN' | translate: {seconds: countdown} }}</span>
  } @else {
    <button class="btn-link" (click)="resendCode()" [disabled]="resendLoading">
      @if (resendLoading) {
        {{ 'LOADING' | translate }}
      } @else {
        {{ 'RESEND_CODE' | translate }}
      }
    </button>
  }
</div>
