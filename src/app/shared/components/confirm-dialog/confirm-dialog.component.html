@if (visible()) {
  <div class="modal-overlay" (click)="onDismiss()">
    <div class="modal-container" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3 class="modal-title">{{ title() | translate }}</h3>
      </div>
      <div class="modal-body">
        <p class="modal-message">{{ message() | translate }}</p>
        @if (requireReason()) {
          <div class="form-group">
            <label class="form-label">{{ reasonLabel() | translate }}</label>
            <textarea
              class="form-textarea"
              [(ngModel)]="reason"
              [placeholder]="reasonLabel() | translate"
              rows="3"
            ></textarea>
            @if (!reason.trim() && requireReason()) {
              <small class="text-danger">{{ 'ADMIN.REASON_REQUIRED' | translate }}</small>
            }
          </div>
        }
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="onDismiss()">
          {{ cancelLabel() | translate }}
        </button>
        <button
          class="btn btn-primary"
          (click)="onConfirm()"
          [disabled]="requireReason() && !reason.trim()"
        >
          {{ confirmLabel() | translate }}
        </button>
      </div>
    </div>
  </div>
}
