<div class="auth-wrapper">
  <nav class="auth-nav">
    <div class="auth-nav-left">
      <button class="nav-icon-btn" (click)="theme.toggle()">
        @if (theme.current() === 'dark') {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        } @else {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        }
      </button>
      <button class="nav-icon-btn" (click)="language.toggle()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <span>{{ language.current() === 'ar' ? 'EN' : 'AR' }}</span>
      </button>
    </div>
    <div class="auth-nav-center">
      <a class="nav-link">الرئيسية</a>
      <a class="nav-link">تواصل معنا</a>
    </div>
    <div class="auth-nav-right">
      <img src="assets/images/harfi_logo.png" height="32" alt="حرفي" />
      <span class="brand-name">حرفي</span>
    </div>
  </nav>

  <div class="auth-split">
    <div class="auth-form-panel">
      <div class="auth-card">
        <router-outlet />
      </div>
    </div>

    @if (isRegisterPage) {
      <div class="auth-register-panel">
        <div class="register-panel-overlay"></div>
        <div class="register-panel-content">
          <div class="register-icon-wrapper">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
              <line x1="21" y1="21" x2="15" y2="15"/>
            </svg>
          </div>
          <h2>{{ 'JOIN_CRAFTSMEN' | translate }}</h2>
          <p>{{ 'REGISTER_TAGLINE' | translate }}</p>
          <div class="register-stats">
            <div class="stat-item">
              <span class="stat-number">10,000+</span>
              <span class="stat-label">{{ 'CRAFTSMEN' | translate }}</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
              <span class="stat-number">50,000+</span>
              <span class="stat-label">{{ 'COMPLETED_ORDERS' | translate }}</span>
            </div>
          </div>
        </div>
      </div>
    } @else {
      <div class="auth-brand-panel">
        <div class="brand-logo-card">
          <img src="assets/images/harfi_logo.png" alt="حرفي" />
        </div>
        <h1>{{ 'WELCOME_BACK' | translate }}</h1>
        <p>{{ 'PLATFORM_TAGLINE' | translate }}</p>
        <div class="brand-icons">🔧 🎨 ⚡ 🔨</div>
      </div>
    }
  </div>
</div>
